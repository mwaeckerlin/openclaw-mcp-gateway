services:
  openclaw-mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: mwaeckerlin/openclaw-mcp-gateway
    environment:
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENCLAW_GATEWAY_KEY: ${OPENCLAW_GATEWAY_KEY:-}
      OPENCLAW_GATEWAY_KEY_FILE: ${OPENCLAW_GATEWAY_KEY_FILE:-}
      OPENCLAW_MCP_HOST: ${OPENCLAW_MCP_HOST:-0.0.0.0}
      OPENCLAW_MCP_PORT: ${OPENCLAW_MCP_PORT:-3000}
    ports:
      - "${OPENCLAW_MCP_PORT:-3000}:${OPENCLAW_MCP_PORT:-3000}"
    restart: unless-stopped
