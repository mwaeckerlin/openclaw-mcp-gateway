services:
  openclaw-mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: mwaeckerlin/openclaw-mcp-gateway
    environment:
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENCLAW_GATEWAY_KEY: ${OPENCLAW_GATEWAY_KEY:-}
      OPENCLAW_GATEWAY_KEY_FILE: ${OPENCLAW_GATEWAY_KEY_FILE:-}
    stdin_open: true
    tty: true
    restart: unless-stopped
