services:
  openclaw-mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-mcp-gateway:local
    environment:
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENCLAW_GATEWAY_KEY: ${OPENCLAW_GATEWAY_KEY:-}
      OPENCLAW_GATEWAY_KEY_FILE: ${OPENCLAW_GATEWAY_KEY_FILE:-}
      OPENCLAW_STATUS_PAYLOAD_JSON: ${OPENCLAW_STATUS_PAYLOAD_JSON:-}
      OPENCLAW_LOGS_PAYLOAD_JSON: ${OPENCLAW_LOGS_PAYLOAD_JSON:-}
    stdin_open: true
    tty: true
    restart: unless-stopped
