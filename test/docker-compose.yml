services:
  openclaw:
    image: alpine/openclaw:latest
    tmpfs:
      - /home/node/.openclaw:rw,uid=1000,gid=1000,mode=0700
      - /home/node/.ssh:rw,uid=1000,gid=1000,mode=0700
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      OPENCLAW_OPENAI_API_KEY: ${OPENCLAW_E2E_OPENAI_API_KEY:-test-openai-key}
    networks:
      - e2e
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  mcp-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mwaeckerlin/openclaw-mcp-gateway
    # Share openclaw's network namespace so the MCP gateway connects to the
    # openclaw gateway via 127.0.0.1. This makes the gateway classify us as a
    # "direct_local" client, which enables skipLocalBackendSelfPairing for
    # ephemeral device identities and preserves our requested operator scopes.
    network_mode: "service:openclaw"
    environment:
      OPENCLAW_GATEWAY_URL: http://127.0.0.1:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      OPENCLAW_MCP_HOST: 0.0.0.0
      OPENCLAW_MCP_PORT: 4000
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  test-client:
    build:
      context: ..
      dockerfile: test/Dockerfile
    # Share openclaw's network namespace so the test client can reach the MCP
    # gateway at 127.0.0.1:4000 within the shared network namespace.
    network_mode: "service:openclaw"
    environment:
      OPENCLAW_E2E_MCP_URL: http://127.0.0.1:4000
    depends_on:
      mcp-gateway:
        condition: service_healthy

networks:
  e2e:
    driver: bridge
