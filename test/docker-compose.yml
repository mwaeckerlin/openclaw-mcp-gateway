services:
  gateway:
    image: mwaeckerlin/openclaw:gateway
    tmpfs:
      - /home/node/.openclaw:rw,uid=1000,gid=1000,mode=0700
      - /home/node/.ssh:rw,uid=1000,gid=1000,mode=0700
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      OPENCLAW_OPENAI_API_KEY: ${OPENCLAW_E2E_OPENAI_API_KEY:-test-openai-key}
      OPENCLAW_SANDBOX_SSH_PRIVATE_KEY: ${OPENCLAW_E2E_SANDBOX_SSH_PRIVATE_KEY:-test-sandbox-key}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  e2e:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      - OPENCLAW_E2E_GATEWAY_URL=${OPENCLAW_E2E_GATEWAY_URL:-http://gateway:18789}
      - OPENCLAW_E2E_GATEWAY_TOKEN=${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      - OPENCLAW_E2E_STATUS_PAYLOAD_JSON
    depends_on:
      gateway:
        condition: service_healthy
    command: sh -c "npm ci && npm run test"
