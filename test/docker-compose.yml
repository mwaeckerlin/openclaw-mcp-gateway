services:
  openclaw:
    image: mwaeckerlin/openclaw:gateway
    tmpfs:
      - /home/node/.openclaw:rw,uid=1000,gid=1000,mode=0700
      - /home/node/.ssh:rw,uid=1000,gid=1000,mode=0700
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      OPENCLAW_OPENAI_API_KEY: ${OPENCLAW_E2E_OPENAI_API_KEY:-test-openai-key}
      # Required by the mwaeckerlin/openclaw:gateway entrypoint; a dummy value
      # is sufficient for E2E tests because no real SSH sandboxes are used.
      OPENCLAW_SANDBOX_SSH_PRIVATE_KEY: dummy
      # Pre-provisioned device pairing.  Generated by test/generate-pairing.mjs
      # before docker compose up; contains the public key that matches the MCP
      # gateway's device identity so the first WS connect succeeds directly
      # without any runtime HTTP pairing round-trip.
      OPENCLAW_DEVICE_PAIRING: ${OPENCLAW_E2E_DEVICE_PAIRING:-}
    networks:
      - openclaw-mcp-gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  mcp-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mwaeckerlin/openclaw-mcp-gateway
    # SECURITY: mcp-gateway sits on two separate bridge networks.
    # The openclaw-mcp-gateway network carries the privileged operator token
    # between mcp-gateway and the openclaw gateway.  The mcp-gateway-test-client
    # network is a separate, segregated segment used solely for MCP traffic
    # between test-client and mcp-gateway.  Keeping them on separate networks
    # prevents the test-client (or any AI agent using the MCP service) from
    # sniffing the operator token with a network analyser: because the client is
    # never on the same L2 segment as the token-carrying traffic, packet capture
    # on the client-facing network will never reveal the token.
    networks:
      - openclaw-mcp-gateway
      - mcp-gateway-test-client
    environment:
      # DNS name of the openclaw gateway container on the shared bridge network.
      OPENCLAW_GATEWAY_URL: http://openclaw:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      # Stable device identity injected by test/generate-pairing.mjs.  The
      # matching public key is pre-registered in the Gateway via
      # OPENCLAW_DEVICE_PAIRING so the first WS connect succeeds directly.
      OPENCLAW_DEVICE_IDENTITY: ${OPENCLAW_E2E_DEVICE_IDENTITY:-}
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  test-client:
    build:
      context: ..
      dockerfile: test/Dockerfile
    # test-client is on the mcp-gateway-test-client network only.  It can
    # reach the MCP gateway by container DNS name (mcp-gateway:4000) but has
    # no route to the openclaw gateway and no access to the operator token.
    networks:
      - mcp-gateway-test-client
    environment:
      OPENCLAW_E2E_MCP_URL: http://mcp-gateway:4000
    depends_on:
      mcp-gateway:
        condition: service_healthy

# Two segregated bridge networks enforce a strict network boundary:
#
#   [openclaw] ←—openclaw-mcp-gateway—→ [mcp-gateway] ←—mcp-gateway-test-client—→ [test-client]
#
# The operator token is only transmitted on openclaw-mcp-gateway.
# test-client is never connected to that segment and cannot sniff the token.
networks:
  openclaw-mcp-gateway:
  mcp-gateway-test-client:
