services:
  openclaw:
    image: alpine/openclaw:latest
    tmpfs:
      - /home/node/.openclaw:rw,uid=1000,gid=1000,mode=0700
      - /home/node/.ssh:rw,uid=1000,gid=1000,mode=0700
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
      OPENCLAW_OPENAI_API_KEY: ${OPENCLAW_E2E_OPENAI_API_KEY:-test-openai-key}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  mcp-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mwaeckerlin/openclaw-mcp-gateway
    environment:
      OPENCLAW_GATEWAY_URL: http://openclaw:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
    stdin_open: true
    depends_on:
      openclaw:
        condition: service_healthy

  test-client:
    build:
      context: ..
      dockerfile: test/Dockerfile
    working_dir: /workspace
    network_mode: service:openclaw
    environment:
      - OPENCLAW_E2E_GATEWAY_URL=${OPENCLAW_E2E_GATEWAY_URL:-http://127.0.0.1:18789}
      - OPENCLAW_E2E_GATEWAY_TOKEN=${OPENCLAW_E2E_GATEWAY_TOKEN:-test-gateway-token}
    depends_on:
      openclaw:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
