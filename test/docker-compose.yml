services:
  e2e:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      OPENCLAW_E2E_GATEWAY_URL: ${OPENCLAW_E2E_GATEWAY_URL:-}
      OPENCLAW_E2E_GATEWAY_TOKEN: ${OPENCLAW_E2E_GATEWAY_TOKEN:-}
      OPENCLAW_E2E_STATUS_PAYLOAD_JSON: ${OPENCLAW_E2E_STATUS_PAYLOAD_JSON:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -lc "npm ci && npm run test"
